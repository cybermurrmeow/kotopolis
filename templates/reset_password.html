{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-pink text-white text-center py-3">
                <i class="fas fa-lock fa-2x mb-2"></i>
                <h3 class="mb-0">Сброс пароля</h3>
                <p class="mb-0 small">Придумайте новый пароль</p>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endwith %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-key"></i> Новый пароль
                        </label>
                        <input type="password" name="password" class="form-control" placeholder="Минимум 4 символа" required minlength="4">
                        <small class="text-muted">Пароль должен содержать буквы и цифры</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-check-circle"></i> Подтвердите пароль
                        </label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Повторите пароль" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100 py-2">
                        <i class="fas fa-save"></i> Сохранить пароль
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-pink text-white">
                    <h5><i class="fas fa-user-plus"></i> Создание пользователя</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">👤 Логин</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">📧 Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">🔐 Пароль</label>
                            <div class="input-group">
                                <input type="password" name="password" id="password" class="form-control" required minlength="4">
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="text-muted">Минимум 4 символа</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">👑 Роль</label>
                            <select name="role" class="form-select">
                                <option value="user">Обычный пользователь</option>
                                <option value="volunteer">Волонтёр</option>
                            </select>
                            <small class="text-muted">Администратора можно создать только через базу данных</small>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-pink">Создать</button>
                            <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Показать/скрыть пароль
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function() {
        // Переключаем тип input
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Меняем иконку
        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });
</script>
{% endblock %}

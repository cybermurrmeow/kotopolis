{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-pink text-white text-center py-3">
                <i class="fas fa-edit fa-2x mb-2"></i>
                <h3 class="mb-0">Редактирование профиля</h3>
                <p class="mb-0 small">{{ current_user.username }}</p>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endwith %}
                
                <form method="POST" enctype="multipart/form-data">
                    <!-- Блок аватара УДАЛЕН -->
                    
                    <div class="mb-3">
                        <label class="form-label">📝 О себе</label>
                        <textarea name="bio" class="form-control" rows="5" placeholder="Расскажите немного о себе...">{{ current_user.bio or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('profile') }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-pink">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

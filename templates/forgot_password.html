{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-pink text-white text-center py-3">
                <i class="fas fa-key fa-2x mb-2"></i>
                <h3 class="mb-0">Восстановление пароля</h3>
                <p class="mb-0 small">Введите email, указанный при регистрации</p>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endwith %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100 py-2">
                        <i class="fas fa-paper-plane"></i> Отправить ссылку для сброса
                    </button>
                </form>
                
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('login') }}" class="text-decoration-none">
                        <i class="fas fa-arrow-left"></i> Вернуться к входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

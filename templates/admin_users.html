{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h1 class="mb-4"><i class="fas fa-users"></i> Управление пользователями</h1>
    
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-pink">
                <tr>
                    <th>ID</th>
                    <th>Имя пользователя</th>
                    <th>Email</th>
                    <th>Текущая роль</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td><strong>{{ user.username }}</strong></td>
                    <td>{{ user.email }}</td>
                    <td>
                        <span class="badge bg-{{ 'success' if user.role == 'admin' else 'primary' if user.role == 'volunteer' else 'secondary' }}">
                            {{ user.role }}
                        </span>
                    </td>
                    <td>
                        <form method="POST" action="{{ url_for('set_role', user_id=user.id) }}" class="d-inline">
                            <select name="role" class="form-select form-select-sm d-inline w-auto">
                                <option value="user" {{ 'selected' if user.role == 'user' else '' }}>Обычный пользователь</option>
                                <option value="volunteer" {{ 'selected' if user.role == 'volunteer' else '' }}>Волонтёр</option>
                                <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>Администратор</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-pink ms-2">Сменить роль</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary mt-3">
        ← Вернуться на дашборд
    </a>
</div>
{% endblock %}
